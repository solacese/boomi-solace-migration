migration_version: "2026.06"
output_dir: out/example-plan
target_folder_id: target-folder-guid
source_connector_types:
  - atomqueue
  - queue

# Connection credentials (use env vars in production)
connection:
  name: shared-solace-connection
  host_env: SOLACE_HOST
  vpn_env: SOLACE_MESSAGE_VPN
  username_env: SOLACE_CLIENT_USERNAME
  password_env: SOLACE_CLIENT_PASSWORD

# Connector profile — inline (no separate file needed)
connector_profile:
  sub_type: officialboomi-solace-pubsubplus
  display_name: Solace PubSub+
  connection_fields:
    host: host
    vpn: vpn
    username: clientUsername
    password: clientPassword
  operation_fields:
    destination: destination
    destination_type: destinationType
    delivery_mode: deliveryMode
  user_properties:
    connector_operation: Solace PubSub+
    connector_source: User Properties

# Naming policy — inline (or omit entirely for built-in defaults)
naming_policy:
  queue:
    prefix: boomi
    separator: _
    max_length: 80
    case: lower
    collision_hash_length: 8
    allowed_pattern: "^[a-z0-9_.-]+$"
  topic:
    separator: /
    max_length: 250
    case: camel
    domain: boomi/migration
    verb: published
    version: v1
    allowed_level_pattern: "^[A-Za-z0-9]+$"
    require_domain_prefix: true
    forbidden_levels: [dev, qa, prod, production, staging]
    forbidden_terms: [traceid, spanid, trace]
  reserved_words:
    - "#DEAD_MSG_QUEUE"
    - default

# Defaults applied to all processes (override per-process as needed)
defaults:
  send_destination_type: TOPIC
  receive_destination_type: QUEUE
  delivery_mode: PERSISTENT
  queue_access_type: exclusive
  queue_owner: boomi_user
  queue_permission: no-access
  provision_dmq: true
  max_redelivery_count: 5
  max_ttl_seconds: 0
  max_spool_usage_mb: 5000
  topic_subscriptions: []

processes:
  # Simple producer — publishes to a topic
  - id: producer-process
    name: Sample Producer Process
    folder_id: source-folder-guid
    target_folder_id: target-folder-guid
    xml_path: tests/fixtures/producer.xml
    send_destination: ""

  # Simple consumer — listens on a queue with topic subscription
  - id: consumer-process
    name: Sample Consumer Process
    folder_id: source-folder-guid
    target_folder_id: target-folder-guid
    xml_path: tests/fixtures/listen_consumer.xml
    receive_destination: ""
    topic_subscriptions:
      - boomi/migration/sampleProducerProcess/published/v1

